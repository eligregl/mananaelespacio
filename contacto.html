<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacta a Mañana El Espacio">
    <title>Contacto - Mañana El Espacio</title>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/contacto.css">
</head>
<body>
    <!-- NAVEGACIÓN -->
    <nav> <!-- Contenido generado por nav.js --> </nav>

    <!-- CONTACTO -->
    <section id="contacto" style="padding-top: 6rem; min-height: 100vh;">
        <h2 class="section-title">CONTACTO</h2>
        <div class="container">
            <div class="contact-90s-wrapper">
                <!-- Intro Text -->
                <div class="contact-intro">
                    <p>Completa el formulario y te respondemos pronto ✌️</p>
                </div>
                
                <!-- Formulario -->
                <div class="contact-form-90s">
                    <form id="contact-form" action="https://formsubmit.co/mananaelespacio@gmail.com" method="POST">
                        <!-- FormSubmit Configuration -->
                        <input type="hidden" name="_subject" value="Nuevo mensaje desde mañanaelespacio.com">
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_template" value="box">
                        <input type="text" name="_honey" style="display:none">
                        
                        <!-- Campos del formulario -->
                        <div class="form-row">
                            <div class="form-field">
                                <label>NOMBRE</label>
                                <input type="text" name="nombre" required>
                            </div>
                            
                            <div class="form-field">
                                <label>EMAIL</label>
                                <input type="email" name="email" required>
                            </div>
                        </div>
                        
                        <div class="form-field">
                            <label>MENSAJE</label>
                            <textarea name="mensaje" rows="8" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn-submit-90s">
                            ENVIAR →
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="social-links">
            <!-- Contenido generado por app.js -->
        </div>
        <p>© 2024 Mañana El Espacio. Todos los derechos reservados.</p>
    </footer>

    <!-- Scripts -->
    <script src="js/nav.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
