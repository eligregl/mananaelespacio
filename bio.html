<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Biografía de Mañana El Espacio">
    <title>Bio - Mañana El Espacio</title>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/bio.css">
</head>
<body>
    <!-- NAVEGACIÓN -->
    <nav id="main-nav"></nav>

    <!-- BIO SECTION -->
    <section id="bio" style="padding-top: 6rem;">
        <h2 class="section-title">BIO</h2>
        
        <div class="bio-container">
            <!-- POLAROIDS SECTION -->
            <div class="polaroids-section">
                <div class="polaroid">
                    <div class="polaroid-image">
                        <img src="assets/images/DSC_5619.JPG" alt="Mañana El Espacio">
                    </div>
                    <div class="polaroid-caption">en vivo</div>
                </div>
                
                <div class="polaroid">
                    <div class="polaroid-image">
                        <img src="assets/images/4FEC040C-5E44-4F63-9751-5DAE495E9EE7_4_5005_c.jpeg" alt="Mañana El Espacio">
                    </div>
                    <div class="polaroid-caption">Hangueando</div>
                </div>
                
                <div class="polaroid">
                    <div class="polaroid-image">
                        <img src="assets/images/DSC_2453.NEF.jpg" alt="Mañana El Espacio">
                    </div>
                    <div class="polaroid-caption">soundcheck</div>
                </div>
            </div>

            <!-- BIO TEXT (cargado dinámicamente) -->
            <div class="bio-text" id="bio-content"></div>
        </div>
    </section>

    <!-- MÚSICA SECTION -->
    <section id="musica" style="min-height: auto;">
        <h2 class="section-title">MÚSICA</h2>
        
        <div class="vinyl-container">
            <div class="vinyl-player">
                <!-- Vinyl record -->
                <div class="vinyl-record" id="vinyl">
                    <div class="vinyl-label">
                        <img src="" alt="Album cover" id="vinyl-cover">
                    </div>
                    <div class="vinyl-grooves"></div>
                </div>
                
                <!-- Album sleeve -->
                <div class="album-sleeve">
                    <img src="" alt="Album art" id="album-art">
                </div>
            </div>
            
            <!-- Album info (cargado dinámicamente) -->
            <div class="album-info" id="album-info"></div>
            
            <p class="next-release">Próximo disco en camino...</p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="social-links" id="social-links"></div>
        <p>© 2024 Mañana El Espacio. Todos los derechos reservados.</p>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Cargar contenido de bio
        document.addEventListener('DOMContentLoaded', function() {
            // Bio content
            const bioContent = document.getElementById('bio-content');
            if (bioContent && siteData.bio) {
                bioContent.innerHTML = siteData.bio.content;
            }
            
            // Album info
            const album = siteData.discography[0];
            if (album) {
                // Actualizar imágenes
                document.getElementById('vinyl-cover').src = album.cover;
                document.getElementById('vinyl-cover').alt = album.title;
                document.getElementById('album-art').src = album.cover;
                document.getElementById('album-art').alt = album.title;
                
                // Crear info del álbum
                document.getElementById('album-info').innerHTML = `
                    <h3>${album.title}</h3>
                    <p class="year">${album.year}</p>
                    <div class="platform-buttons">
                        <a href="https://${album.links.spotify}" target="_blank" class="btn-platform spotify">SPOTIFY</a>
                        <a href="https://${album.links.bandcamp}" target="_blank" class="btn-platform bandcamp">BANDCAMP</a>
                        <a href="https://${album.links.youtube}" target="_blank" class="btn-platform youtube">YOUTUBE</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
