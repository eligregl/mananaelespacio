<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mañana El Espacio - Banda indie/shoegaze/dreampop. Descubre nuestra música.">
    <title>Mañana El Espacio</title>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- NAVEGACIÓN -->
    <nav> <!-- Contenido generado por nav.js --> </nav>

    <!-- HERO SECTION -->
    <section class="hero" id="hero">
        <img src="assets/images/_MG_6980.jpg" alt="Mañana El Espacio" class="hero-image" loading="eager">
        <div class="hero-bg"></div>
        
        <div class="hero-content">
            <h1 class="band-name">MAÑANA EL ESPACIO</h1>
            
            <!-- REPRODUCTOR -->
            <div class="player-container">
                <div class="track-display">
                    <div class="track-title">CARGANDO...</div>
                </div>
                
                <div class="player-controls">
                    <button class="control-btn prev-btn" aria-label="Canción anterior">◄◄</button>
                    <button class="play-btn" aria-label="Reproducir/Pausar">▶</button>
                    <button class="control-btn next-btn" aria-label="Siguiente canción">►►</button>
                </div>
                
                <div class="progress-container">
                    <div class="progress-bar" role="progressbar" aria-label="Progreso de reproducción">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- FOOTER -->
    <footer>
        <div class="social-links">
            <!-- Contenido generado por app.js -->
        </div>
        <p>© 2025 Mañana El Espacio. Todos los derechos reservados.</p>
    </footer>

    <!-- Scripts -->
    <script src="js/nav.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
